<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Publication Lists Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f11;
  --surface: #17171a;
  --surface2: #1e1e22;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0eee8;
  --text2: #8a8880;
  --text3: #55534f;
  --accent: #7B6EF6;
  --green: #3ecf8e;
  --amber: #f5a623;
  --radius: 10px;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1.5rem;}
.container{max-width:1200px;margin:0 auto;}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px;}
.topbar-left h1{font-size:22px;font-weight:600;letter-spacing:-0.02em;}
.topbar-left p{font-size:12px;color:var(--text2);margin-top:3px;font-family:var(--mono);}
.add-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:8px 16px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s;}
.add-btn:hover{opacity:.85;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem;}
.stat{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.stat-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);margin-bottom:6px;}
.stat-value{font-size:24px;font-weight:600;color:var(--text);}
.stat-value.sm{font-size:14px;padding-top:4px;font-weight:500;}
.controls{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
.controls input{flex:1;min-width:180px;background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius);padding:8px 12px;font-family:var(--sans);font-size:13px;color:var(--text);outline:none;}
.controls input::placeholder{color:var(--text3);}
.controls input:focus{border-color:var(--accent);}
.controls select{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius);padding:8px 12px;font-family:var(--sans);font-size:13px;color:var(--text);outline:none;cursor:pointer;}
.controls select:focus{border-color:var(--accent);}
.table-wrap{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
table{width:100%;border-collapse:collapse;table-layout:fixed;}
thead tr{background:var(--surface2);}
th{padding:10px 14px;text-align:left;font-size:10px;font-weight:600;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;border-bottom:0.5px solid var(--border);}
th:nth-child(1){width:19%;}th:nth-child(2){width:9%;}th:nth-child(3){width:12%;}th:nth-child(4){width:14%;}th:nth-child(5){width:29%;}th:nth-child(6){width:11%;}th:nth-child(7){width:6%;}
td{padding:11px 14px;font-size:13px;border-bottom:0.5px solid var(--border);vertical-align:top;word-break:break-word;}
tbody tr:last-child td{border-bottom:none;}
tbody tr{transition:background .1s;}
tbody tr:hover{background:var(--surface2);}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 8px;border-radius:6px;white-space:nowrap;font-family:var(--mono);}
.b-optipub{background:rgba(123,110,246,.18);color:#a89ff9;border:0.5px solid rgba(123,110,246,.3);}
.b-keap{background:rgba(62,207,142,.15);color:#3ecf8e;border:0.5px solid rgba(62,207,142,.25);}
.b-beehiiv{background:rgba(245,166,35,.15);color:#f5a623;border:0.5px solid rgba(245,166,35,.25);}
.b-custom{background:rgba(255,255,255,.07);color:var(--text2);border:0.5px solid var(--border2);}
.lt-paid{background:rgba(62,207,142,.15);color:#3ecf8e;border:0.5px solid rgba(62,207,142,.25);}
.lt-mirrored{background:rgba(123,110,246,.18);color:#a89ff9;border:0.5px solid rgba(123,110,246,.3);}
.lt-free{background:rgba(100,180,255,.15);color:#64b4ff;border:0.5px solid rgba(100,180,255,.25);}
.lt-editorial{background:rgba(245,166,35,.15);color:#f5a623;border:0.5px solid rgba(245,166,35,.25);}
.lt-dedicated{background:rgba(224,54,140,.15);color:#e87ab8;border:0.5px solid rgba(224,54,140,.25);}
.seg{background:var(--surface2);border:0.5px solid var(--border2);border-radius:6px;padding:2px 7px;font-size:11px;font-family:var(--mono);color:var(--text2);}
.auto-pill{display:inline-block;font-size:10px;font-weight:600;padding:2px 6px;border-radius:5px;background:rgba(62,207,142,.15);color:#3ecf8e;font-family:var(--mono);}
.ts{font-size:11px;color:var(--text2);font-family:var(--mono);}
.action-btns{display:flex;gap:4px;}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:3px 5px;border-radius:5px;transition:all .1s;}
.icon-btn:hover{background:var(--surface2);color:var(--text);}
.icon-btn.del:hover{color:#ff6b6b;}
.empty-row td{text-align:center;color:var(--text3);padding:3rem;font-family:var(--mono);font-size:12px;}
.loading-row td{text-align:center;color:var(--text2);padding:3rem;font-size:12px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:0.5px solid var(--border2);border-radius:14px;padding:1.75rem;width:min(500px,100%);display:flex;flex-direction:column;gap:14px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:600;letter-spacing:-0.01em;}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text2);}
.field input,.field select,.field textarea{background:var(--bg);border:0.5px solid var(--border2);border-radius:8px;padding:9px 12px;font-family:var(--sans);font-size:13px;color:var(--text);outline:none;width:100%;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field textarea{height:80px;resize:vertical;}
.modal-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.custom-input-wrap{display:none;margin-top:6px;}
.date-toggle{display:flex;border:0.5px solid var(--border2);border-radius:8px;overflow:hidden;}
.date-toggle button{flex:1;background:none;border:none;padding:8px 10px;font-size:12px;cursor:pointer;color:var(--text2);border-radius:0;font-family:var(--sans);transition:all .15s;}
.date-toggle button.active{background:var(--surface2);color:var(--text);font-weight:500;}
.date-toggle button:not(:last-child){border-right:0.5px solid var(--border2);}
.date-hint{font-size:11px;color:var(--text3);margin-top:4px;}
.date-manual-wrap{display:none;margin-top:6px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
.btn-cancel{background:var(--surface2);border:0.5px solid var(--border2);border-radius:8px;padding:8px 16px;font-family:var(--sans);font-size:13px;color:var(--text2);cursor:pointer;}
.btn-cancel:hover{color:var(--text);}
.btn-save{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 20px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s;}
.btn-save:hover{opacity:.85;}
.btn-save:disabled{opacity:.4;cursor:not-allowed;}
.sync-status{font-size:11px;color:var(--text2);font-family:var(--mono);}
.sync-status.saving{color:var(--amber);}
.sync-status.saved{color:var(--green);}
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="topbar-left">
      <h1>Publication lists</h1>
      <p id="last-updated-global">Loading…</p>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span class="sync-status" id="sync-status"></span>
      <button class="add-btn" onclick="openModal()">+ Add publication</button>
    </div>
  </div>
  <div class="stats" id="stats-row"></div>
  <div class="controls">
    <input type="text" id="search" placeholder="Search by name, segment, or description…" oninput="renderTable()">
    <select id="filterPlatform" onchange="renderTable()"><option value="">All platforms</option></select>
    <select id="filterType" onchange="renderTable()">
      <option value="">All types</option>
      <option>Paid</option><option>Mirrored of paid</option><option>Free</option><option>Editorial</option><option>Dedicated</option>
    </select>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Publication name</th><th>Segment</th><th>Platform</th><th>List type</th><th>Description</th><th>Last updated</th><th></th>
      </tr></thead>
      <tbody id="tbody"><tr class="loading-row"><td colspan="7">Loading…</td></tr></tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <p class="modal-title" id="modal-title">Add publication</p>
    <div class="field"><label>Publication name</label><input type="text" id="fName" placeholder="e.g. Don-DTE Mirrored"></div>
    <div class="modal-row-3">
      <div class="field"><label>Segment #</label><input type="text" id="fSegment" placeholder="e.g. 287"></div>
      <div class="field">
        <label>Platform</label>
        <select id="fPlatform" onchange="handlePlatformChange()">
          <option value="Optipub">Optipub</option>
          <option value="Keap">Keap</option>
          <option value="Beehiiv">Beehiiv</option>
          <option value="__custom__">Other…</option>
        </select>
        <div class="custom-input-wrap" id="customWrap"><input type="text" id="fCustomPlatform" placeholder="Platform name"></div>
      </div>
      <div class="field">
        <label>List type</label>
        <select id="fListType">
          <option>Paid</option><option>Mirrored of paid</option><option>Free</option><option>Editorial</option><option>Dedicated</option>
        </select>
      </div>
    </div>
    <div class="field"><label>Description</label><textarea id="fDesc" placeholder="What is this list used for?"></textarea></div>
    <div class="field">
      <label>Last updated</label>
      <div class="date-toggle">
        <button id="btn-auto" class="active" onclick="setDateMode('auto')">Automatic</button>
        <button id="btn-manual" onclick="setDateMode('manual')">Set manually</button>
      </div>
      <div class="date-manual-wrap" id="dateManualWrap"><input type="date" id="fDate"></div>
      <span class="date-hint" id="date-hint">Automatically sets to today's date when saved.</span>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="btn-save" onclick="saveEntry()">Save</button>
    </div>
  </div>
</div>

<script>
const BIN_ID = "69e7a7d236566621a8d89eb5";
const API_KEY = "$2a$10$Tym51vzh7DLN2G.HFzWp4eyAKBleCcC8Hxm91/18S/9nGjRcjNVUm";
const BIN_URL = "https://api.jsonbin.io/v3/b/" + BIN_ID;

let data = [];
let editId = null;
let dateMode = "auto";

function setSync(state, msg) {
  const el = document.getElementById("sync-status");
  el.textContent = msg;
  el.className = "sync-status" + (state ? " " + state : "");
}

async function loadData() {
  try {
    const res = await fetch(BIN_URL + "/latest", {
      headers: { "X-Access-Key": API_KEY }
    });
    const json = await res.json();
    data = Array.isArray(json.record) ? json.record : [];
  } catch(e) {
    data = [];
  }
  renderAll();
}

async function persistData() {
  setSync("saving", "Saving…");
  try {
    const res = await fetch(BIN_URL, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Access-Key": API_KEY
      },
      body: JSON.stringify(data)
    });
    if (res.ok) {
      setSync("saved", "Saved ✓");
      setTimeout(() => setSync("", ""), 2500);
    } else {
      setSync("", "⚠ Save failed");
    }
  } catch(e) {
    setSync("", "⚠ Save failed");
  }
}

function fmt(d) {
  if (!d) return "—";
  return new Date(d).toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
}
function badgeClass(p) {
  return { Optipub:"b-optipub", Keap:"b-keap", Beehiiv:"b-beehiiv" }[p] || "b-custom";
}
function listTypeClass(t) {
  return { "Paid":"lt-paid","Mirrored of paid":"lt-mirrored","Free":"lt-free","Editorial":"lt-editorial","Dedicated":"lt-dedicated" }[t] || "b-custom";
}
function setDateMode(mode) {
  dateMode = mode;
  document.getElementById("btn-auto").classList.toggle("active", mode==="auto");
  document.getElementById("btn-manual").classList.toggle("active", mode==="manual");
  document.getElementById("dateManualWrap").style.display = mode==="manual" ? "block" : "none";
  document.getElementById("date-hint").textContent = mode==="auto"
    ? "Automatically sets to today's date when saved."
    : "Enter the date this publication was last updated.";
}
function handlePlatformChange() {
  document.getElementById("customWrap").style.display =
    document.getElementById("fPlatform").value === "__custom__" ? "block" : "none";
}
function updateFilterOptions() {
  const sel = document.getElementById("filterPlatform");
  const cur = sel.value;
  const all = [...new Set(data.map(d => d.platform))].sort();
  sel.innerHTML = '<option value="">All platforms</option>' + all.map(p => `<option${cur===p?" selected":""}>${p}</option>`).join("");
}
function renderStats() {
  const platforms = {}, types = {};
  data.forEach(d => {
    platforms[d.platform] = (platforms[d.platform]||0)+1;
    types[d.listType] = (types[d.listType]||0)+1;
  });
  const topPlat = Object.entries(platforms).sort((a,b)=>b[1]-a[1])[0];
  const topType = Object.entries(types).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById("stats-row").innerHTML = `
    <div class="stat"><div class="stat-label">Total lists</div><div class="stat-value">${data.length}</div></div>
    <div class="stat"><div class="stat-label">Platforms</div><div class="stat-value">${Object.keys(platforms).length}</div></div>
    <div class="stat"><div class="stat-label">Top platform</div><div class="stat-value sm">${topPlat?topPlat[0]:"—"}</div></div>
    <div class="stat"><div class="stat-label">Top type</div><div class="stat-value sm">${topType?topType[0]:"—"}</div></div>
  `;
}
function renderMeta() {
  const el = document.getElementById("last-updated-global");
  if (!data.length) { el.textContent = "No publications yet"; return; }
  const withDates = data.filter(d=>d.updated);
  if (!withDates.length) { el.textContent = ""; return; }
  const latest = withDates.reduce((a,b)=>new Date(a.updated)>new Date(b.updated)?a:b);
  el.textContent = "Last updated " + fmt(latest.updated);
}
function renderDateCell(d) {
  if (!d.updated) return '<span class="ts">—</span>';
  return d.autoDate
    ? `<div style="display:flex;flex-direction:column;gap:3px;"><span class="auto-pill">Auto</span><span class="ts">${fmt(d.updated)}</span></div>`
    : `<span class="ts">${fmt(d.updated)}</span>`;
}
function renderTable() {
  const q = document.getElementById("search").value.toLowerCase();
  const pf = document.getElementById("filterPlatform").value;
  const lt = document.getElementById("filterType").value;
  const filtered = data.filter(d =>
    (!q || d.name.toLowerCase().includes(q) || (d.desc||"").toLowerCase().includes(q) || d.segment.includes(q)) &&
    (!pf || d.platform===pf) &&
    (!lt || d.listType===lt)
  );
  const tbody = document.getElementById("tbody");
  if (!filtered.length) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="7">No publications match your filters.</td></tr>`;
  } else {
    tbody.innerHTML = filtered.map(d => `
      <tr>
        <td style="font-weight:500;">${d.name}</td>
        <td><span class="seg">#${d.segment}</span></td>
        <td><span class="badge ${badgeClass(d.platform)}">${d.platform}</span></td>
        <td><span class="badge ${listTypeClass(d.listType)}">${d.listType}</span></td>
        <td style="color:var(--text2);font-size:12px;">${d.desc||""}</td>
        <td>${renderDateCell(d)}</td>
        <td><div class="action-btns">
          <button class="icon-btn" onclick="openModal(${d.id})" title="Edit">✎</button>
          <button class="icon-btn del" onclick="deleteEntry(${d.id})" title="Remove">×</button>
        </div></td>
      </tr>
    `).join("");
  }
}
function renderAll() {
  renderStats(); renderMeta(); renderTable(); updateFilterOptions();
}
function openModal(id) {
  editId = id || null;
  document.getElementById("modal-title").textContent = id ? "Edit publication" : "Add publication";
  document.getElementById("customWrap").style.display = "none";
  if (id) {
    const d = data.find(x=>x.id===id);
    document.getElementById("fName").value = d.name;
    document.getElementById("fSegment").value = d.segment;
    document.getElementById("fDesc").value = d.desc||"";
    document.getElementById("fListType").value = d.listType||"Paid";
    const known = ["Optipub","Keap","Beehiiv"];
    if (known.includes(d.platform)) {
      document.getElementById("fPlatform").value = d.platform;
    } else {
      document.getElementById("fPlatform").value = "__custom__";
      document.getElementById("fCustomPlatform").value = d.platform;
      document.getElementById("customWrap").style.display = "block";
    }
    if (d.autoDate) setDateMode("auto");
    else { setDateMode("manual"); if(d.updated) document.getElementById("fDate").value = new Date(d.updated).toISOString().split("T")[0]; }
  } else {
    ["fName","fSegment","fDesc","fCustomPlatform","fDate"].forEach(i=>document.getElementById(i).value="");
    document.getElementById("fPlatform").value="Optipub";
    document.getElementById("fListType").value="Paid";
    setDateMode("auto");
  }
  document.getElementById("modalOverlay").classList.add("open");
}
function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
  editId = null;
}
async function saveEntry() {
  const name = document.getElementById("fName").value.trim();
  const segment = document.getElementById("fSegment").value.trim();
  const platSel = document.getElementById("fPlatform").value;
  const platform = platSel==="__custom__" ? document.getElementById("fCustomPlatform").value.trim() : platSel;
  const listType = document.getElementById("fListType").value;
  const desc = document.getElementById("fDesc").value.trim();
  if (!name||!segment) { alert("Name and segment are required."); return; }
  if (!platform) { alert("Please enter a platform name."); return; }
  let updated, autoDate;
  if (dateMode==="auto") { updated=new Date().toISOString(); autoDate=true; }
  else {
    const dateVal = document.getElementById("fDate").value;
    if (!dateVal) { alert("Please select a date."); return; }
    updated=new Date(dateVal+"T12:00:00").toISOString(); autoDate=false;
  }
  const btn = document.getElementById("btn-save");
  btn.disabled=true; btn.textContent="Saving…";
  if (editId) {
    const i = data.findIndex(d=>d.id===editId);
    data[i] = {...data[i], name, segment, platform, listType, desc:desc||"No description provided.", updated, autoDate};
  } else {
    data.push({id:Date.now(), name, segment, platform, listType, desc:desc||"No description provided.", updated, autoDate});
  }
  await persistData();
  btn.disabled=false; btn.textContent="Save";
  closeModal(); renderAll();
}
async function deleteEntry(id) {
  if (!confirm("Remove this publication?")) return;
  data = data.filter(d=>d.id!==id);
  await persistData();
  renderAll();
}
document.getElementById("modalOverlay").addEventListener("click", function(e) {
  if (e.target===this) closeModal();
});

loadData();
</script>
</body>
</html>
